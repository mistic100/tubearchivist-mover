<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TubeArchivist Mover</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>
    <link rel="stylesheet" href="/styles.css" />
</head>

<body>
    <main class="container">
        <h1>TubeArchivist Mover</h1>
        <p class="subtitle">
            Move TubeArchivist videos between channels.
        </p>
        <section class="card">
            <h2>Move a single video</h2>
            <move-form></move-form>
        </section>
        <section class="card">
            <h2>Move an entire channel</h2>
            <bulk-move-form></bulk-move-form>
        </section>
        <section class="card">
            <h2>Rename a channel</h2>
            <rename-channel-form></rename-channel-form>
        </section>
    </main>
    <script type="module" src="/app.js"></script>
</body>

</html>
